<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" style="font-family:Inter,Segoe UI,sans-serif;background:#0a0f1e;">

  <defs>
    <!-- Glow filters -->
    <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-blue"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-purple"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <!-- Gradient backgrounds -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1526"/>
    </linearGradient>
    <linearGradient id="user-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="frontend-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e4d3a"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <linearGradient id="backend-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2a4a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c3547"/>
      <stop offset="100%" style="stop-color:#0e4966"/>
    </linearGradient>
    <linearGradient id="pdf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1942"/>
      <stop offset="100%" style="stop-color:#7c2d6a"/>
    </linearGradient>

    <!-- Pulse animations along paths -->
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f472b6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg-grad)" rx="12"/>

  <!-- Grid dots background -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#1e293b" opacity="0.6"/>
  </pattern>
  <rect width="900" height="620" fill="url(#dots)" rx="12"/>

  <!-- ══════════════════ TITLE ══════════════════ -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f8fafc" letter-spacing="1">
    🧠 NeuroVision AI — Live System Architecture
  </text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#64748b">Real-time data flow: Patient → AI Inference → Report</text>

  <!-- ══════════════════ NODE: USER ══════════════════ -->
  <rect x="375" y="72" width="150" height="52" rx="10" fill="url(#user-grad)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">👤 Patient / User</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#c4b5fd">Browser at localhost:3000</text>

  <!-- Arrow: User → Frontend -->
  <line x1="450" y1="124" x2="450" y2="152" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Animated pulse: User → Frontend -->
  <circle r="5" fill="#34d399" opacity="0.9" filter="url(#glow-green)">
    <animateMotion dur="1.2s" repeatCount="indefinite" begin="0s">
      <mpath href="#path-user-fe"/>
    </animateMotion>
  </circle>
  <path id="path-user-fe" d="M450,124 L450,152" fill="none"/>

  <!-- ══════════════════ NODE: NEXT.JS FRONTEND ══════════════════ -->
  <rect x="150" y="155" width="600" height="140" rx="10" fill="url(#frontend-grad)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">⚡ Next.js 15 Frontend — Port 3000</text>

  <!-- Frontend modules in 3 columns -->
  <!-- Row 1 -->
  <rect x="168" y="185" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="233" y="199" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🔬 NeuroVision AI</text>
  <text x="233" y="213" text-anchor="middle" font-size="8.5" fill="#a7f3d0">Diagnostics Module</text>

  <rect x="310" y="185" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="375" y="199" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🤖 MedBot AI Chat</text>
  <text x="375" y="213" text-anchor="middle" font-size="8.5" fill="#a7f3d0">Groq llama-3.3-70b</text>

  <rect x="452" y="185" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="517" y="199" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🎙️ Voice Therapist</text>
  <text x="517" y="213" text-anchor="middle" font-size="8.5" fill="#a7f3d0">Aria — Web Speech API</text>

  <rect x="594" y="185" width="138" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="663" y="199" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">📅 Doctor Booking</text>
  <text x="663" y="213" text-anchor="middle" font-size="8.5" fill="#a7f3d0">Leaflet Map + Supabase</text>

  <!-- Row 2 -->
  <rect x="168" y="228" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="233" y="242" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🧠 Mental Health</text>
  <text x="233" y="256" text-anchor="middle" font-size="8.5" fill="#a7f3d0">PHQ-9 / GAD-7 / MoCA</text>

  <rect x="310" y="228" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="375" y="242" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🎮 Cognitive Games</text>
  <text x="375" y="256" text-anchor="middle" font-size="8.5" fill="#a7f3d0">eval_game1/2/3</text>

  <rect x="452" y="228" width="130" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="517" y="242" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">👨‍👩‍👧 Family Connect</text>
  <text x="517" y="256" text-anchor="middle" font-size="8.5" fill="#a7f3d0">Shared health profiles</text>

  <rect x="594" y="228" width="138" height="36" rx="6" fill="#052e1c" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="663" y="242" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">🌐 VR Connect</text>
  <text x="663" y="256" text-anchor="middle" font-size="8.5" fill="#a7f3d0">FrameVR Room</text>

  <!-- Arrow: Frontend → Backend -->
  <line x1="450" y1="295" x2="450" y2="327" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="460" y="315" font-size="9" fill="#94a3b8">REST API / multipart</text>
  <!-- Pulse -->
  <circle r="5" fill="#38bdf8" opacity="0.9" filter="url(#glow-blue)">
    <animateMotion dur="1.1s" repeatCount="indefinite" begin="0.4s">
      <mpath href="#path-fe-be"/>
    </animateMotion>
  </circle>
  <path id="path-fe-be" d="M450,295 L450,327" fill="none"/>

  <!-- ══════════════════ NODE: FASTAPI BACKEND ══════════════════ -->
  <rect x="200" y="330" width="500" height="80" rx="10" fill="url(#backend-grad)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="450" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8">🚀 FastAPI Backend — Port 8000</text>

  <rect x="218" y="360" width="100" height="28" rx="5" fill="#0c2a4a" stroke="#38bdf8" stroke-width="0.7"/>
  <text x="268" y="370" text-anchor="middle" font-size="8" fill="#7dd3fc">🧠 AI Classifier</text>
  <text x="268" y="382" text-anchor="middle" font-size="7.5" fill="#bae6fd">medical_classifier.py</text>

  <rect x="328" y="360" width="100" height="28" rx="5" fill="#0c2a4a" stroke="#38bdf8" stroke-width="0.7"/>
  <text x="378" y="370" text-anchor="middle" font-size="8" fill="#7dd3fc">📄 PDF Generator</text>
  <text x="378" y="382" text-anchor="middle" font-size="7.5" fill="#bae6fd">ReportLab</text>

  <rect x="438" y="360" width="100" height="28" rx="5" fill="#0c2a4a" stroke="#38bdf8" stroke-width="0.7"/>
  <text x="488" y="370" text-anchor="middle" font-size="8" fill="#7dd3fc">☁️ Groq LLM</text>
  <text x="488" y="382" text-anchor="middle" font-size="7.5" fill="#bae6fd">llama-3.3-70b</text>

  <rect x="548" y="360" width="134" height="28" rx="5" fill="#0c2a4a" stroke="#38bdf8" stroke-width="0.7"/>
  <text x="615" y="370" text-anchor="middle" font-size="8" fill="#7dd3fc">🗄️ Supabase Layer</text>
  <text x="615" y="382" text-anchor="middle" font-size="7.5" fill="#bae6fd">reports + bookings</text>

  <!-- ══════════════════ ARROWS: BE → AI Models & BE → DB ══════════════════ -->

  <!-- BE → AI Models (left-down) -->
  <path d="M320,410 L200,445" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.6s" repeatCount="indefinite"/>
  </path>
  <!-- Pulse BE → AI -->
  <circle r="5" fill="#a78bfa" opacity="0.9" filter="url(#glow-purple)">
    <animateMotion dur="1.3s" repeatCount="indefinite" begin="0.2s">
      <mpath href="#path-be-ai"/>
    </animateMotion>
  </circle>
  <path id="path-be-ai" d="M320,410 L200,445" fill="none"/>

  <!-- BE → Supabase DB (right-down) -->
  <path d="M660,410 L790,445" stroke="#38bdf8" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.7s" repeatCount="indefinite"/>
  </path>
  <!-- Pulse BE → DB -->
  <circle r="5" fill="#38bdf8" opacity="0.9" filter="url(#glow-blue)">
    <animateMotion dur="1.3s" repeatCount="indefinite" begin="0.6s">
      <mpath href="#path-be-db"/>
    </animateMotion>
  </circle>
  <path id="path-be-db" d="M660,410 L790,445" fill="none"/>

  <!-- BE → PDF (center-down straight) -->
  <path d="M450,410 L450,445" stroke="#f472b6" stroke-width="1.8" fill="none" marker-end="url(#arrow-pink)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.5s" repeatCount="indefinite"/>
  </path>
  <!-- Pulse BE → PDF -->
  <circle r="5" fill="#f472b6" opacity="0.9">
    <animateMotion dur="1.0s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#path-be-pdf"/>
    </animateMotion>
  </circle>
  <path id="path-be-pdf" d="M450,410 L450,445" fill="none"/>

  <!-- ══════════════════ NODE: AI MODELS ══════════════════ -->
  <rect x="25" y="448" width="370" height="145" rx="10" fill="url(#ai-grad)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="468" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa">🤖 AI Model Ensemble</text>

  <!-- Model cards -->
  <rect x="38" y="475" width="160" height="48" rx="6" fill="#1e1040" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="118" y="490" text-anchor="middle" font-size="9" font-weight="700" fill="#c4b5fd">🫁 CustomNet121</text>
  <text x="118" y="503" text-anchor="middle" font-size="8" fill="#ddd6fe">Chest X-Ray • 14 Labels</text>
  <text x="118" y="516" text-anchor="middle" font-size="8" fill="#34d399" font-weight="700">Accuracy: 94.4%</text>

  <rect x="207" y="475" width="175" height="48" rx="6" fill="#1e1040" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="294" y="490" text-anchor="middle" font-size="9" font-weight="700" fill="#c4b5fd">🧠 InceptionV3 Ensemble</text>
  <text x="294" y="503" text-anchor="middle" font-size="8" fill="#ddd6fe">Brain MRI • 4-Class</text>
  <text x="294" y="516" text-anchor="middle" font-size="8" fill="#34d399" font-weight="700">Accuracy: 98%+</text>

  <rect x="38" y="532" width="160" height="48" rx="6" fill="#1e1040" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="118" y="547" text-anchor="middle" font-size="9" font-weight="700" fill="#c4b5fd">🦴 MedSigLIP</text>
  <text x="118" y="560" text-anchor="middle" font-size="8" fill="#ddd6fe">Bone / General Scans</text>
  <text x="118" y="573" text-anchor="middle" font-size="8" fill="#fbbf24" font-weight="700">Zero-Shot • 20+ labels</text>

  <rect x="207" y="532" width="175" height="48" rx="6" fill="#1e1040" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="294" y="547" text-anchor="middle" font-size="9" font-weight="700" fill="#c4b5fd">📋 CheXpert DenseNet121</text>
  <text x="294" y="560" text-anchor="middle" font-size="8" fill="#ddd6fe">Stanford Weights • Chest</text>
  <text x="294" y="573" text-anchor="middle" font-size="8" fill="#fbbf24" font-weight="700">14-Label Pathology</text>

  <!-- ══════════════════ NODE: PDF OUTPUT ══════════════════ -->
  <rect x="362" y="448" width="176" height="80" rx="10" fill="url(#pdf-grad)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#f472b6">📄 PDF Clinical Report</text>
  <text x="450" y="487" text-anchor="middle" font-size="9" fill="#fbcfe8">ReportLab • Professional Format</text>
  <text x="450" y="502" text-anchor="middle" font-size="8.5" fill="#fbcfe8">FINDINGS · IMPRESSION</text>
  <text x="450" y="516" text-anchor="middle" font-size="8.5" fill="#fbcfe8">RECOMMENDATIONS · Disclaimer</text>

  <!-- ══════════════════ NODE: SUPABASE DB ══════════════════ -->
  <rect x="505" y="448" width="370" height="145" rx="10" fill="url(#db-grad)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="690" y="468" text-anchor="middle" font-size="12" font-weight="700" fill="#38bdf8">🗄️ Supabase (PostgreSQL)</text>

  <rect x="520" y="475" width="160" height="48" rx="6" fill="#061f30" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="600" y="491" text-anchor="middle" font-size="9" font-weight="700" fill="#7dd3fc">👤 Users Table</text>
  <text x="600" y="504" text-anchor="middle" font-size="8" fill="#bae6fd">id · email · role · name</text>
  <text x="600" y="517" text-anchor="middle" font-size="7.5" fill="#94a3b8">Supabase Auth + JWT</text>

  <rect x="692" y="475" width="175" height="48" rx="6" fill="#061f30" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="779" y="491" text-anchor="middle" font-size="9" font-weight="700" fill="#7dd3fc">📅 Appointments Table</text>
  <text x="779" y="504" text-anchor="middle" font-size="8" fill="#bae6fd">doctor · patient · mode</text>
  <text x="779" y="517" text-anchor="middle" font-size="7.5" fill="#94a3b8">online / offline · status</text>

  <rect x="520" y="532" width="160" height="48" rx="6" fill="#061f30" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="600" y="547" text-anchor="middle" font-size="9" font-weight="700" fill="#7dd3fc">📋 Diagnostic Reports</text>
  <text x="600" y="560" text-anchor="middle" font-size="8" fill="#bae6fd">scan_type · disease</text>
  <text x="600" y="573" text-anchor="middle" font-size="7.5" fill="#94a3b8">confidence · report_text</text>

  <rect x="692" y="532" width="175" height="48" rx="6" fill="#061f30" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="779" y="547" text-anchor="middle" font-size="9" font-weight="700" fill="#7dd3fc">🔑 Supabase Auth</text>
  <text x="779" y="560" text-anchor="middle" font-size="8" fill="#bae6fd">JWT Sessions</text>
  <text x="779" y="573" text-anchor="middle" font-size="7.5" fill="#94a3b8">Row Level Security</text>

  <!-- ══════════════════ RETURN FLOW: AI → BE (response back) ══════════════════ -->
  <!-- Result back pulse top-right of AI box going up -->
  <circle r="4" fill="#fbbf24" opacity="0.85">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="1.0s">
      <mpath href="#path-ai-be-return"/>
    </animateMotion>
  </circle>
  <path id="path-ai-be-return" d="M200,448 L320,410" fill="none"/>

  <!-- DB result back -->
  <circle r="4" fill="#fbbf24" opacity="0.85">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="1.4s">
      <mpath href="#path-db-be-return"/>
    </animateMotion>
  </circle>
  <path id="path-db-be-return" d="M790,448 L660,410" fill="none"/>

  <!-- PDF → User response back up -->
  <circle r="4" fill="#f472b6" opacity="0.85">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.8s">
      <mpath href="#path-pdf-user"/>
    </animateMotion>
  </circle>
  <path id="path-pdf-user" d="M450,448 L450,410 L450,295 L450,155 L450,124" fill="none"/>

  <!-- ══════════════════ LEGEND ══════════════════ -->
  <rect x="25" y="600" width="855" height="16" rx="4" fill="#0f172a" opacity="0.8"/>
  <circle cx="45" cy="608" r="4" fill="#34d399"/><text x="55" y="612" font-size="8.5" fill="#64748b">User → Frontend</text>
  <circle cx="155" cy="608" r="4" fill="#38bdf8"/><text x="165" y="612" font-size="8.5" fill="#64748b">Frontend → Backend (REST)</text>
  <circle cx="315" cy="608" r="4" fill="#a78bfa"/><text x="325" y="612" font-size="8.5" fill="#64748b">Backend → AI Models</text>
  <circle cx="450" cy="608" r="4" fill="#f472b6"/><text x="460" y="612" font-size="8.5" fill="#64748b">→ PDF Report</text>
  <circle cx="555" cy="608" r="4" fill="#38bdf8"/><text x="565" y="612" font-size="8.5" fill="#64748b">→ Supabase DB</text>
  <circle cx="645" cy="608" r="4" fill="#fbbf24"/><text x="655" y="612" font-size="8.5" fill="#64748b">Response returned to user</text>

</svg>
